<!DOCTYPE html>
<html>
<head>
  <title>Pixel Battle VK</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div style="position: fixed; top: 10px; left: 10px; z-index: 10;">
    <input type="color" id="colorPicker" value="#ff0000"/>
    <button id="placeBtn" style="display:block; margin-top:5px;">Поставить</button>
    <div id="cooldown" style="margin-top:5px; background:#fff; padding:5px;">
      Поставить
    </div>
  </div>

  <div id="timer" style="position: fixed; top: 10px; right: 10px; background: rgb(255, 255, 255); padding: 5px;"></div>

  <script>
    const socket = io("https://pixel-battle-server.onrender.com");

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const SIZE = 100;
    let PIXEL;
    let grid = [];

    let selectedPixel = null;
    let canPlace = true;
    let cooldown = 5000;

    let scale = 1, offsetX = 0, offsetY = 0;
    let isDragging = false, lastX = 0, lastY = 0;

    let userId = null;
    vkBridge.send('VKWebAppInit');
    vkBridge.send('VKWebAppGetUserInfo').then(data => userId = data.id);

    function resizeCanvas() {
      const screenSize = Math.min(window.innerWidth, window.innerHeight) - 20;
      canvas.width = screenSize;
      canvas.height = screenSize;
      PIXEL = canvas.width / SIZE;
      draw();
    }
    window.addEventListener("resize", resizeCanvas);

    function draw() {
      ctx.setTransform(scale, 0, 0, scale, offsetX, offsetY);

      for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
          const pixel = grid[y][x];
          ctx.fillStyle = pixel ? pixel.color : "#FFFFFF";
          ctx.fillRect(x * PIXEL, y * PIXEL, PIXEL, PIXEL);
        }
      }

      // подсветка выбранного пикселя
      if (selectedPixel) {
        ctx.strokeStyle = "black";
        ctx.lineWidth = 2;
        ctx.strokeRect(
          selectedPixel.x * PIXEL,
          selectedPixel.y * PIXEL,
          PIXEL,
          PIXEL
        );
      }
    }

    let startTime, duration;

    socket.on("init", (data) => {
      grid = data.canvas;
      startTime = data.startTime;
      duration = data.duration;
      resizeCanvas();
      startTimer();
    });

    socket.on("update", ({ x, y, color, userId: pid }) => {
      grid[y][x] = { color, userId: pid };
      draw();
    });

    socket.on("fullCanvasUpdate", (fullCanvas) => {
      grid = fullCanvas;
      draw();
    });

    function startTimer() {
      setInterval(() => {
        const timeLeft = duration - (Date.now() - startTime);
        document.getElementById("timer").innerText =
          timeLeft <= 0 ? "Батл завершён" : Math.ceil(timeLeft / 1000) + " сек";
      }, 1000);
    }

    function getPixelCoords(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const x = (clientX - rect.left - offsetX) / scale;
      const y = (clientY - rect.top - offsetY) / scale;
      return { x: Math.floor(x / PIXEL), y: Math.floor(y / PIXEL) };
    }

    canvas.addEventListener("click", (e) => {
      const { x, y } = getPixelCoords(e.clientX, e.clientY);
      selectedPixel = { x, y };
      draw();
    });

    const placeBtn = document.getElementById("placeBtn");
    const cooldownDiv = document.getElementById("cooldown");

    placeBtn.addEventListener("click", () => {
      if (!selectedPixel) return;
      if (!canPlace) return;
      if (!userId) return;
      if (Date.now() - startTime > duration) return;

      const { x, y } = selectedPixel;
      const color = document.getElementById("colorPicker").value;

      socket.emit("pixel", { x, y, color, userId });

      startCooldown();
    });

    function startCooldown() {
      canPlace = false;
      let timeLeft = cooldown / 1000;

      cooldownDiv.innerText = timeLeft + " сек";

      const interval = setInterval(() => {
        timeLeft--;
        cooldownDiv.innerText = timeLeft + " сек";

        if (timeLeft <= 0) {
          clearInterval(interval);
          canPlace = true;
          cooldownDiv.innerText = "Поставить";
        }
      }, 1000);
    }

    canvas.addEventListener("mousedown", e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
    canvas.addEventListener("mousemove", e => { 
      if(!isDragging) return; 
      offsetX += e.clientX - lastX; 
      offsetY += e.clientY - lastY; 
      lastX = e.clientX; lastY = e.clientY; 
      draw(); 
    });
    canvas.addEventListener("mouseup", () => { isDragging = false; });

    canvas.addEventListener("touchstart", e => { isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; });
    canvas.addEventListener("touchmove", e => { 
      if(!isDragging) return; 
      if(e.touches.length == 1){ 
        offsetX += e.touches[0].clientX - lastX; 
        offsetY += e.touches[0].clientY - lastY; 
        lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; 
        draw(); 
      }
    });
    canvas.addEventListener("touchend", () => { isDragging = false; });

    canvas.addEventListener("wheel", e => { 
      e.preventDefault(); 
      scale *= e.deltaY < 0 ? 1.1 : 0.9; 
      draw(); 
    });
  </script>
</body>
</html>
